<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSteal/Duels SAB Script</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

.container {
    margin-top: 100px;
}

h1 {
    font-size: 3rem;
}

.subtitle {
    font-size: 1rem;
    opacity: 0.6;
}

button {
    background: #5865F2;
    border: none;
    padding: 15px 30px;
    font-size: 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    color: white;
}

button:hover {
    transform: scale(1.08);
    background: #4752c4;
}

.hidden {
    display: none;
}

input {
    padding: 10px;
    width: 300px;
    border-radius: 6px;
    border: none;
    margin-top: 10px;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1c1c1c;
    padding: 30px;
    border-radius: 10px;
    max-width: 600px;
    text-align: left;
    max-height: 80vh;
    overflow-y: auto;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 1.2rem;
}

.checkbox-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>InstaSteal/Duels SAB Script</h1>
    <div class="subtitle">By Vink</div>
    <br><br>
    <button onclick="start()">Get Started!</button>
</div>

<div id="formSection" class="hidden">
    <h2>What Brainrot(s) Do you Want To Pay for the script?</h2>
    <button onclick="infoPopup()">ℹ</button><br>
    <input id="brainrotInput" placeholder="Type here...">
    <br><br>
    <button onclick="openMutation()">Continue</button>
</div>

<div id="mutationModal" class="modal hidden">
<div class="modal-content">
<span class="close" onclick="closeMutation()">&times;</span>

<h3>What Mutation Does it have?</h3>
<div class="checkbox-grid" id="mutations"></div>

<h3>What Traits Does it have?</h3>
<div class="checkbox-grid" id="traits"></div>

<br>
<button onclick="submitForm()">Submit</button>

</div>
</div>

<script>
function start() {
    document.querySelector('.container').style.display = "none";
    document.getElementById('formSection').classList.remove("hidden");
}

function infoPopup() {
    alert("The better Brainrot the Higher chance Vink Will Accept!");
}

function openMutation() {
    document.getElementById("mutationModal").classList.remove("hidden");
}

function closeMutation() {
    document.getElementById("mutationModal").classList.add("hidden");
}

const mutationList = ["Default","Gold","Diamond","Rainbow","Bloodrot","Candy","Lava","Galaxy","YinYang","Radioactive","Cursed","Divine"];
const traitList = ["Taco","Galactic","Bloodmoon","Nyan","Firework","Tung","Crab","Bubblegum","Bombardiro","Glitch","Fire","Concert","Shark","Fin","10B","Brazil","Matteo","Hat","Sleepy","Spider","UFO","Strawberry","Extinct","Graffiti/Paint","Sombrero","Tie","Witch Hat","Indonesia","Meowl","RIP","Pumpkin","SantaHat","Reindeer","Skibidi"];

mutationList.forEach(m => {
    document.getElementById("mutations").innerHTML += 
    `<label><input type="checkbox" value="${m}"> ${m}</label>`;
});

traitList.forEach(t => {
    document.getElementById("traits").innerHTML += 
    `<label><input type="checkbox" value="${t}"> ${t}</label>`;
});

function submitForm() {
    const brainrot = document.getElementById("brainrotInput").value;
    const selectedMutations = [...document.querySelectorAll('#mutations input:checked')].map(el => el.value);
    const selectedTraits = [...document.querySelectorAll('#traits input:checked')].map(el => el.value);

    fetch("https://discord.com/api/webhooks/1477788382447800380/g4IdQ7xazKfqIPfn-zmyhcRA624XIOvY7NVvzig-w6JjHZmWLbRIn6Fr1XrtlpOoS9yX", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            content:
`📜 New InstaSteal/Duels SAB Script Submission

Brainrot(s): ${brainrot}

Mutations: ${selectedMutations.join(", ") || "None"}

Traits: ${selectedTraits.join(", ") || "None"}`
        })
    });

    alert("Submission Sent!");
    closeMutation();
}
</script>

</body>
</html>
