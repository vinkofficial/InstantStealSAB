<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSteal/Duels SAB Script</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Segoe UI',sans-serif;
    background:#0a0f1c;
    color:white;
    overflow:hidden;
}

canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

.container {
    text-align:center;
    padding-top:120px;
}

h1 {
    font-size:48px;
    text-shadow:0 0 20px #00f7ff;
}

.sub {
    opacity:0.7;
    margin-bottom:40px;
    font-size:14px;
}

button {
    padding:12px 28px;
    border-radius:12px;
    border:2px solid #00f7ff;
    background:transparent;
    color:#00f7ff;
    cursor:pointer;
    margin:8px;
    font-weight:bold;
    transition:0.3s;
}

button:hover {
    background:#00f7ff;
    color:black;
    box-shadow:0 0 25px #00f7ff;
}

.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:600px;
    border:2px solid #00f7ff;
    text-align:center;
}

input {
    width:80%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

.toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111827;
    padding:15px 25px;
    border-left:4px solid #00f7ff;
    border-radius:12px;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>InstaSteal/Duels SAB Script</h1>
    <div class="sub">By Vink</div>
    <button onclick="openMain()">Get Started!</button>
</div>

<div id="mainModal" class="modal">
  <div class="modal-content">
    <h2>What Brainrot(s) Do you Want To Pay for the script?</h2>
    <input id="brainrotInput" placeholder="Type here...">
    <br>
    <button onclick="showInfo()">ℹ Info</button>
    <button onclick="openMutation()">Next</button>
  </div>
</div>

<div id="mutationModal" class="modal">
  <div class="modal-content">
    <h2>What Mutation Does it have?</h2>
    <select id="mutationSelect">
      <option>Default</option><option>Gold</option><option>Diamond</option>
      <option>Rainbow</option><option>Bloodrot</option><option>Candy</option>
      <option>Lava</option><option>Galaxy</option><option>YinYang</option>
      <option>Radioactive</option><option>Cursed</option><option>Divine</option>
    </select>
    <br><br>
    <button onclick="openTraits()">Next</button>
  </div>
</div>

<div id="traitModal" class="modal">
  <div class="modal-content">
    <h2>What Traits Does it have?</h2>
    <select id="traitSelect">
      <option>Taco</option><option>Galactic</option><option>Bloodmoon</option>
      <option>Nyan</option><option>Firework</option><option>Tung</option>
      <option>Crab</option><option>Bubblegum</option><option>Bombardiro</option>
      <option>Glitch</option><option>Fire</option><option>Concert</option>
      <option>Shark</option><option>Fin</option><option>10B</option>
      <option>Brazil</option><option>Matteo</option><option>Hat</option>
      <option>Sleepy</option><option>Spider</option><option>UFO</option>
      <option>Strawberry</option><option>Extinct</option><option>Graffiti/Paint</option>
      <option>Sombrero</option><option>Tie</option><option>Witch</option>
      <option>Indonesia</option><option>Meowl</option><option>RIP</option>
      <option>Pumpkin</option><option>SantaHat</option><option>Reindeer</option>
      <option>Skibidi</option>
    </select>
    <br><br>
    <button onclick="submitAll()">Submit</button>
  </div>
</div>

<script>
const WORKER_URL="https://webhook-sender.vinkgt-official.workers.dev/";

function openMain(){
  document.getElementById("mainModal").style.display="flex";
}

function showInfo(){
  alert("The better Brainrot the Higher chance Vink Will Accept!");
}

function openMutation(){
  document.getElementById("mainModal").style.display="none";
  document.getElementById("mutationModal").style.display="flex";
}

function openTraits(){
  document.getElementById("mutationModal").style.display="none";
  document.getElementById("traitModal").style.display="flex";
}

function submitAll(){
  const brainrot=document.getElementById("brainrotInput").value;
  const mutation=document.getElementById("mutationSelect").value;
  const trait=document.getElementById("traitSelect").value;

  fetch(WORKER_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      mutation:mutation,
      trait:trait,
      brainrot:brainrot
    })
  }).then(()=>{
    alert("Sent Successfully!");
    location.reload();
  });
}

/* particles */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<40;i++){
 particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5});
}
function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="#00f7ff";
 particles.forEach(p=>{
  p.x+=p.vx;
  p.y+=p.vy;
  ctx.fillRect(p.x,p.y,2,2);
 });
 requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
