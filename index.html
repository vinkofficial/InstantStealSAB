<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSteal/Duels SAB Script</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    min-height: 100vh;
}

.nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.nav button {
    background: #1f1f1f;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.nav button:hover {
    background: #5865F2;
}

.container {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.card {
    background: #141414;
    padding: 40px;
    border-radius: 14px;
    width: 100%;
    max-width: 750px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    animation: fadeIn 0.4s ease;
}

h1 {
    margin: 0;
    font-size: 2rem;
}

.subtitle {
    opacity: 0.6;
    margin-bottom: 25px;
}

.section {
    margin-top: 20px;
}

input[type="text"] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 8px;
    background: #1f1f1f;
    color: white;
    outline: none;
}

.checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 6px;
    margin-top: 10px;
    font-size: 0.85rem;
}

label {
    background: #1c1c1c;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
}

button.submit-btn {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: #5865F2;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}

button.submit-btn:hover {
    background: #4752c4;
}

.hidden {
    display: none;
}

.vouch-gallery-container {
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
    margin-top: 20px;
}

.vouch-gallery {
    display: flex;
    gap: 15px;
    overflow-x: scroll;
    scroll-behavior: smooth;
    padding-bottom: 10px;
}

.vouch-gallery::-webkit-scrollbar {
    display: none;
}

.vouch-gallery img {
    height: 300px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    flex-shrink: 0;
}

.arrow {
    position: absolute;
    background: rgba(30,30,30,0.8);
    border: none;
    color: white;
    font-size: 2rem;
    top: 50%;
    transform: translateY(-50%);
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 6px;
    z-index: 10;
    transition: 0.2s;
}

.arrow:hover {
    background: #5865F2;
}

.arrow.left {
    left: 5px;
}

.arrow.right {
    right: 5px;
}

.toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast {
    background: #1f1f1f;
    padding: 12px 18px;
    border-radius: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    animation: slideUp 0.4s ease;
    font-size: 0.9rem;
}

@keyframes slideUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="nav">
    <button onclick="showBuy()">Buy</button>
    <button onclick="showVouches()">Vouches</button>
</div>

<div class="container">

<!-- BUY SECTION -->
<div id="buySection" class="card">
    <h1>InstaSteal/Duels SAB Script</h1>
    <div class="subtitle">By Vink</div>

    <div class="section">
        <strong>Which Brainrot(s) Would You Like To Pay With?</strong>
        <input type="text" id="brainrotInput" placeholder="Type your Brainrot(s) here...">
    </div>

    <div class="section">
        <strong>What Mutation Does It Have?</strong>
        <div class="checkbox-grid" id="mutations"></div>
    </div>

    <div class="section">
        <strong>What Traits Does It Have?</strong>
        <div class="checkbox-grid" id="traits"></div>
    </div>

    <button class="submit-btn" onclick="submitForm()">Submit</button>
</div>

<!-- VOUCH SECTION -->
<div id="vouchSection" class="card hidden">
    <h1>Vouches</h1>
    <div class="subtitle">Proof of previous successful sales</div>

    <div class="vouch-gallery-container">
        <button class="arrow left" onclick="scrollGallery(-1)">&#10094;</button>
        <div class="vouch-gallery" id="vouchGallery">
            <img src="Photo1.png" alt="Vouch 1">
            <img src="Photo2.png" alt="Vouch 2">
            <img src="Photo3.png" alt="Vouch 3">
            <img src="Photo4.png" alt="Vouch 4">
        </div>
        <button class="arrow right" onclick="scrollGallery(1)">&#10095;</button>
    </div>
</div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const mutationList = ["Default","Gold","Diamond","Rainbow","Bloodrot","Candy","Lava","Galaxy","YinYang","Radioactive","Cursed","Divine"];
const traitList = ["Taco","Galactic","Bloodmoon","Nyan","Firework","Tung","Crab","Bubblegum","Bombardiro","Glitch","Fire","Concert","Shark","Fin","10B","Brazil","Matteo","Hat","Sleepy","Spider","UFO","Strawberry","Extinct","Graffiti/Paint","Sombrero","Tie","Witch Hat","Indonesia","Meowl","RIP","Pumpkin","SantaHat","Reindeer","Skibidi"];

mutationList.forEach(m => {
    document.getElementById("mutations").innerHTML += 
    `<label><input type="checkbox" value="${m}"> ${m}</label>`;
});

traitList.forEach(t => {
    document.getElementById("traits").innerHTML += 
    `<label><input type="checkbox" value="${t}"> ${t}</label>`;
});

function showBuy() {
    document.getElementById("buySection").classList.remove("hidden");
    document.getElementById("vouchSection").classList.add("hidden");
}

function showVouches() {
    document.getElementById("vouchSection").classList.remove("hidden");
    document.getElementById("buySection").classList.add("hidden");
}

function scrollGallery(direction) {
    const gallery = document.getElementById("vouchGallery");
    const scrollAmount = 320; // approx width of one image + gap
    gallery.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
}

function showToast(message) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = message;
    document.getElementById("toastContainer").appendChild(toast);

    setTimeout(() => toast.remove(), 3000);
}

window.onload = function() {
    showToast("Welcome user!");
};

function submitForm() {
    const brainrot = document.getElementById("brainrotInput").value;
    const selectedMutations = [...document.querySelectorAll('#mutations input:checked')].map(el => el.value);
    const selectedTraits = [...document.querySelectorAll('#traits input:checked')].map(el => el.value);

    fetch("https://discord.com/api/webhooks/1477788382447800380/g4IdQ7xazKfqIPfn-zmyhcRA624XIOvY7NVvzig-w6JjHZmWLbRIn6Fr1XrtlpOoS9yX", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            content:
`📜 New InstaSteal/Duels SAB Script Submission

Brainrot(s): ${brainrot || "None"}

Mutations: ${selectedMutations.join(", ") || "None"}

Traits: ${selectedTraits.join(", ") || "None"}`
        })
    });

    showToast("Sent!");
}
</script>

</body>
</html>
