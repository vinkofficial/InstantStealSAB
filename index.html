<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSteal/Duels SAB Script</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117; color: #e6edf3;
    text-align: center;
}
.container { padding: 60px 20px; }
h1 { font-size: 40px; margin-bottom: 5px; }
.sub { font-size: 14px; color: #8b949e; margin-bottom: 40px; }
button, input { cursor: pointer; }
button { padding: 12px 25px; border: none; border-radius: 8px; }
.primary { background: #238636; color: white; }
.secondary { background: #30363d; color: white; }
.modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); justify-content:center; align-items:center;
}
.modal-content {
    background:#161b22; padding:30px; border-radius:12px;
    width:90%; max-width:700px; text-align:left;
}
input[type="text"] {
    width:80%; padding: 8px; margin-top: 10px;
    background:#0d1117; border:1px solid #30363d; color:white;
}
.search { width:80%; padding:8px; margin-top:10px; }
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(120px,1fr));
    gap:8px; margin-top:10px;
}
.grid label {
    background:#30363d; padding:6px; border-radius:6px; font-size:13px;
}
.close-btn { margin-top:20px; }
</style>
</head>
<body>

<div class="container">
    <h1>InstaSteal/Duels SAB Script</h1>
    <div class="sub">By Vink</div>
    <button class="primary" onclick="openMain()">Get Started!</button>
    <button class="secondary" onclick="adminMode()">Admin Panel</button>
</div>

<!-- MAIN MODAL -->
<div class="modal" id="mainModal">
    <div class="modal-content">
        <h2>What Brainrot(s) Do you Want To Pay for the script?</h2>
        <input id="brainrotInput" type="text" placeholder="Type brainrot here...">
        <button class="secondary" onclick="alert('The better Brainrot the Higher chance Vink Will Accept!')">Info</button>
        <br><br>

        <h3>Search Mutation</h3>
        <input id="mutSearch" class="search" type="text" placeholder="Search mutation..." onkeyup="filterList('mut')">

        <div id="mutGrid" class="grid"></div>

        <h3>Search Trait</h3>
        <input id="traitSearch" class="search" type="text" placeholder="Search trait..." onkeyup="filterList('trait')">
        <div id="traitGrid" class="grid"></div>

        <button class="primary" onclick="sendDiscord()">Send</button>
        <button class="secondary close-btn" onclick="closeAll()">Close</button>
    </div>
</div>

<script>
// Discord webhook
const WEBHOOK_URL = "https://discord.com/api/webhooks/1477785093031460875/-ooSc729qgYIDp31qFsT1N65ISErhHA2O3eqx7EKQS-5fv8Oeyg644hRRWjMbFU8BhGe";

// Data lists
const mutations = ["Default", "Gold", "Diamond", "Rainbow","Bloodrot","Candy","Lava","Galaxy","YinYang","Radioactive","Cursed","Divine"];
const traits = ["Taco","Galactic","Bloodmoon","Nyan","Firework","Tung","Crab","Bubblegum","Bombardiro","Glitch","Fire","Concert","Shark","Fin","10B","Brazil","Matteo","Hat","Sleepy","Spider","UFO","Strawberry","Extinct","Graffiti/Paint","Sombrero","Tie","Witch","Hat","Indonesia","Meowl","RIP","Pumpkin","SantaHat","Reindeer","Skibidi"];

let selectedMut = [];
let selectedTrait = [];

// open main modal
function openMain(){
    document.getElementById("mainModal").style.display="flex";
    buildList('mut');
    buildList('trait');
}

// close modals
function closeAll(){
    document.getElementById("mainModal").style.display="none";
}

// build lists
function buildList(type){
    const list = type==="mut" ? mutations : traits;
    const container = document.getElementById(type==="mut"?"mutGrid":"traitGrid");
    container.innerHTML="";
    list.forEach(item=>{
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
        container.appendChild(label);
    });
}

// live search filter
function filterList(type){
    const search = document.getElementById(type==="mut"?"mutSearch":"traitSearch").value.toLowerCase();
    const list = type==="mut" ? mutations : traits;
    const container = document.getElementById(type==="mut"?"mutGrid":"traitGrid");
    container.innerHTML="";
    list.filter(x => x.toLowerCase().includes(search)).forEach(item=>{
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
        container.appendChild(label);
    });
}

// send to discord
function sendDiscord(){
    selectedMut = Array.from(document.querySelectorAll("#mutGrid input:checked")).map(i=>i.value);
    selectedTrait = Array.from(document.querySelectorAll("#traitGrid input:checked")).map(i=>i.value);
    const brainrot = document.getElementById("brainrotInput").value || "No text";

    const content = `**New SAB Script Request**\n**Brainrot:** ${brainrot}\n**Mutations:** ${selectedMut.join(", ") || "None"}\n**Traits:** ${selectedTrait.join(", ") || "None"}`;

    fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ content })
    })
    .then(res=> {
        if(res.ok) alert("Sent to Discord!");
        else alert("Error sending.");
    });

    closeAll();
}

// admin panel (basic)
function adminMode(){
    const code = prompt("Enter Admin Code:");
    if(code === "vink123"){
        alert("Welcome Admin! Check Discord for submissions 😎");
    } else {
        alert("Wrong Code! 😕");
    }
}
</script>

</body>
</html>
