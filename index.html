<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSteal/Duels SAB Script</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow-x: hidden;
    transition: background 0.5s ease;
}

/* Animated gradient background */
body.default-bg {
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1f1c2c);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Center content */
.container {
    text-align: center;
    padding: 100px 20px;
}

h1 {
    font-size: 48px;
    margin: 0;
}

.sub {
    opacity: 0.7;
    margin-bottom: 40px;
}

button {
    padding: 12px 28px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    margin: 5px;
    font-weight: bold;
    transition: 0.3s ease;
}

.primary {
    background: #00ffae;
    color: black;
}

.primary:hover {
    transform: scale(1.07);
    box-shadow: 0 0 20px #00ffae;
}

.secondary {
    background: rgba(255,255,255,0.1);
    color: white;
}

.secondary:hover {
    background: rgba(255,255,255,0.2);
}

/* Glass Modal */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 700px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

input[type="text"], input[type="color"] {
    width: 80%;
    padding: 8px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

.search {
    width: 80%;
    padding: 8px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(120px,1fr));
    gap: 8px;
    margin-top: 10px;
}

.grid label {
    background: rgba(255,255,255,0.1);
    padding: 6px;
    border-radius: 8px;
    font-size: 13px;
}

/* Notifications */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.8);
    padding: 15px 25px;
    border-radius: 15px;
    box-shadow: 0 0 15px #00ffae;
    animation: slideIn 0.5s ease;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* RGB animation */
@keyframes rgbMove {
    0% { background-color: red; }
    33% { background-color: green; }
    66% { background-color: blue; }
    100% { background-color: red; }
}
</style>
</head>
<body class="default-bg">

<div class="container">
    <h1>InstaSteal/Duels SAB Script</h1>
    <div class="sub">By Vink</div>
    <button class="primary" onclick="openMain()">Get Started!</button>
    <button class="secondary" onclick="adminMode()">Admin Panel</button>
</div>

<!-- MAIN MODAL -->
<div class="modal" id="mainModal">
<div class="modal-content">
<h2>What Brainrot(s) Do you Want To Pay for the script?</h2>
<input id="brainrotInput" type="text" placeholder="Type brainrot here...">
<br><br>

<h3>Search Mutation</h3>
<input id="mutSearch" class="search" type="text" placeholder="Search mutation..." onkeyup="filterList('mut')">
<div id="mutGrid" class="grid"></div>

<h3>Search Trait</h3>
<input id="traitSearch" class="search" type="text" placeholder="Search trait..." onkeyup="filterList('trait')">
<div id="traitGrid" class="grid"></div>

<br>
<button class="primary" onclick="sendDiscord()">Send</button>
<button class="secondary" onclick="closeAll()">Close</button>
</div>
</div>

<!-- MOD MENU -->
<div class="modal" id="modMenu">
<div class="modal-content">
<h2>Vink Mod Menu</h2>

<button class="primary" onclick="enableRGB()">Enable RGB Background</button>
<br><br>
<label>Pick Custom Background Color:</label><br>
<input type="color" onchange="setColor(this.value)">
<br><br>
<button class="secondary" onclick="closeMod()">Close</button>

</div>
</div>

<script>
const WEBHOOK_URL = "PASTE YOUR WEBHOOK HERE";

const mutations = ["Default","Gold","Diamond","Rainbow","Bloodrot","Candy","Lava","Galaxy","YinYang","Radioactive","Cursed","Divine"];
const traits = ["Taco","Galactic","Bloodmoon","Nyan","Firework","Tung","Crab","Bubblegum","Bombardiro","Glitch","Fire","Concert","Shark","Fin","10B","Brazil","Matteo","Hat","Sleepy","Spider","UFO","Strawberry","Extinct","Graffiti/Paint","Sombrero","Tie","Witch","Hat","Indonesia","Meowl","RIP","Pumpkin","SantaHat","Reindeer","Skibidi"];

window.onload = function(){
    showToast("Welcome user!");
};

function showToast(message){
    const toast = document.createElement("div");
    toast.className="toast";
    toast.innerText=message;
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),3000);
}

function openMain(){
    document.getElementById("mainModal").style.display="flex";
    buildList('mut');
    buildList('trait');
}

function closeAll(){
    document.getElementById("mainModal").style.display="none";
}

function buildList(type){
    const list = type==="mut"?mutations:traits;
    const container = document.getElementById(type==="mut"?"mutGrid":"traitGrid");
    container.innerHTML="";
    list.forEach(item=>{
        const label=document.createElement("label");
        label.innerHTML=`<input type="checkbox" value="${item}"> ${item}`;
        container.appendChild(label);
    });
}

function filterList(type){
    const search=document.getElementById(type==="mut"?"mutSearch":"traitSearch").value.toLowerCase();
    const list=type==="mut"?mutations:traits;
    const container=document.getElementById(type==="mut"?"mutGrid":"traitGrid");
    container.innerHTML="";
    list.filter(x=>x.toLowerCase().includes(search)).forEach(item=>{
        const label=document.createElement("label");
        label.innerHTML=`<input type="checkbox" value="${item}"> ${item}`;
        container.appendChild(label);
    });
}

function sendDiscord(){
    showToast("Request Sent!");
}

function adminMode(){
    const code=prompt("Enter Admin Code:");
    if(code==="vink123"){
        document.getElementById("modMenu").style.display="flex";
        showToast("Welcome Vink 👑");
    } else {
        showToast("Wrong Code!");
    }
}

function closeMod(){
    document.getElementById("modMenu").style.display="none";
}

function enableRGB(){
    document.body.classList.remove("default-bg");
    document.body.style.animation="rgbMove 5s linear infinite";
}

function setColor(color){
    document.body.style.animation="none";
    document.body.style.background=color;
}
</script>

</body>
</html>
