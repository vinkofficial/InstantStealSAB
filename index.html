<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation & Trait Submit</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

.container {
  max-width: 500px;
  margin: 100px auto;
  padding: 30px;
  background: rgba(20,20,40,0.9);
  border-radius: 15px;
  box-shadow: 0 0 25px #00f7ff;
  border: 2px solid #00f7ff;
  text-align: center;
}

select, input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #00f7ff;
  color: black;
  font-weight: bold;
  transition: 0.2s ease;
}

button:hover {
  background: white;
  transform: scale(1.05);
}

#notifications {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.notification {
  background: #111;
  border-left: 4px solid #00f7ff;
  padding: 12px 20px;
  margin-top: 10px;
  border-radius: 8px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>Submit Your Mutation</h1>

  <!-- Mutation Dropdown -->
  <select id="mutationSelect" onchange="toggleMutationInput()">
    <option value="">Select Mutation</option>
    <option>Overcharged</option>
    <option>Shadowborn</option>
    <option>Crystal Skin</option>
    <option value="custom">Custom Mutation</option>
  </select>

  <input id="customMutation" placeholder="Type custom mutation" style="display:none;">

  <!-- Trait Dropdown -->
  <select id="traitSelect" onchange="toggleTraitInput()">
    <option value="">Select Trait</option>
    <option>Speed Boost</option>
    <option>Double Jump</option>
    <option>Night Vision</option>
    <option value="custom">Custom Trait</option>
  </select>

  <input id="customTrait" placeholder="Type custom trait" style="display:none;">

  <button onclick="sendData()">Send</button>
</div>

<div id="notifications"></div>

<script>
const workerURL = "https://webhook-sender.vinkgt-official.workers.dev/";

function showNotification(message) {
  const notif = document.createElement("div");
  notif.className = "notification";
  notif.innerText = message;
  document.getElementById("notifications").appendChild(notif);

  setTimeout(() => notif.remove(), 4000);
}

function toggleMutationInput() {
  const select = document.getElementById("mutationSelect");
  const input = document.getElementById("customMutation");
  input.style.display = select.value === "custom" ? "block" : "none";
}

function toggleTraitInput() {
  const select = document.getElementById("traitSelect");
  const input = document.getElementById("customTrait");
  input.style.display = select.value === "custom" ? "block" : "none";
}

function sendData() {
  let mutation = document.getElementById("mutationSelect").value;
  let trait = document.getElementById("traitSelect").value;

  if (mutation === "custom") {
    mutation = document.getElementById("customMutation").value;
  }

  if (trait === "custom") {
    trait = document.getElementById("customTrait").value;
  }

  if (!mutation || !trait) {
    showNotification("Select or type both mutation and trait.");
    return;
  }

  fetch(workerURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      mutation: mutation,
      trait: trait
    })
  })
  .then(() => {
    showNotification("Submission sent successfully.");
  })
  .catch(() => {
    showNotification("Error sending submission.");
  });
}

window.onload = () => {
  showNotification("Welcome user!");
};
</script>

</body>
</html>
