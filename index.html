<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation & Trait Submit</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  overflow-x: hidden;
}

.container {
  max-width: 500px;
  margin: 100px auto;
  padding: 30px;
  background: rgba(20,20,40,0.9);
  border-radius: 15px;
  box-shadow: 0 0 25px #00f7ff;
  border: 2px solid #00f7ff;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #00f7ff;
  color: black;
  font-weight: bold;
  transition: 0.2s ease;
}

button:hover {
  background: white;
  transform: scale(1.05);
}

#notifications {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.notification {
  background: #111;
  border-left: 4px solid #00f7ff;
  padding: 12px 20px;
  margin-top: 10px;
  border-radius: 8px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>Submit Your Mutation</h1>

  <input id="mutation" placeholder="Enter your mutation">
  <input id="trait" placeholder="Enter your trait">

  <button onclick="sendData()">Send</button>

  <hr style="margin:20px 0; opacity:0.3;">

  <h3>Search</h3>
  <input id="searchMutation" placeholder="Search mutation">
  <input id="searchTrait" placeholder="Search trait">
  <button onclick="searchData()">Search</button>
</div>

<div id="notifications"></div>

<script>
const workerURL = "https://webhook-sender.vinkgt-official.workers.dev/";

function showNotification(message) {
  const notif = document.createElement("div");
  notif.className = "notification";
  notif.innerText = message;
  document.getElementById("notifications").appendChild(notif);

  setTimeout(() => {
    notif.remove();
  }, 4000);
}

function sendData() {
  const mutation = document.getElementById("mutation").value;
  const trait = document.getElementById("trait").value;

  if (!mutation || !trait) {
    showNotification("Fill in both fields.");
    return;
  }

  fetch(workerURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      mutation: mutation,
      trait: trait
    })
  })
  .then(res => res.text())
  .then(() => {
    showNotification("Submission sent successfully.");
    document.getElementById("mutation").value = "";
    document.getElementById("trait").value = "";
  })
  .catch(() => {
    showNotification("Error sending submission.");
  });
}

function searchData() {
  const m = document.getElementById("searchMutation").value;
  const t = document.getElementById("searchTrait").value;

  showNotification("Search feature is frontend only right now.");
}

window.onload = () => {
  showNotification("Welcome user!");
};
</script>

</body>
</html>
